<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050510"/>
      <stop offset="100%" style="stop-color:#1a0a3a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#bf5fff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect x="4" y="4" width="504" height="504" rx="98" fill="none" stroke="url(#glow)" stroke-width="6" opacity="0.6"/>
  <!-- Python snake emoji style icon -->
  <text x="256" y="320" text-anchor="middle" font-size="240" font-family="serif">🐍</text>
  <!-- PyPlan text -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="url(#glow)" letter-spacing="6">PYPLAN</text>
</svg>